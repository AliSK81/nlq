name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-document-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test document-index
        run: |
          cd document-index
          pip install -e ".[dev]"
          pytest --cov=app --cov-report=term-missing -q

  test-query-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test query-agent
        run: |
          cd query-agent
          pip install -e ".[dev]"
          pytest --cov=app --cov-report=term-missing -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff check
        run: |
          pip install ruff
          ruff check document-index query-agent
