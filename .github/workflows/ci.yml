name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-document-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test document-index
        run: |
          cd document-index
          pip install -e ".[dev]"
          pytest --cov=app --cov-report=term-missing -q -m "not integration"

  test-query-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test query-agent
        run: |
          cd query-agent
          pip install -e ".[dev]"
          pytest --cov=app --cov-report=term-missing -q

  test-document-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test document-console
        run: |
          cd document-console
          pip install -e ".[dev]"
          pytest -q

  integration-qdrant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Qdrant integration tests
        run: |
          cd document-index
          pip install -e ".[dev]"
          pytest tests/test_integration_qdrant.py -q

  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: DeepEval golden set (skips without LLM_API_KEY)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          pip install -e "query-agent/[dev]"
          pip install -e "query-agent/[eval]" || pip install deepeval
          pytest evals/test_rag_quality.py -q

  perf-k6:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Write Compose .env
        run: |
          cp .env.example .env
          # LLM_* overridden by docker-compose.ci.yml → mock-llm (no repo secrets required)

      - name: Build and start CI stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build \
            postgres qdrant tika mock-llm document-index query-agent
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up --wait --wait-timeout 600 mock-llm document-index query-agent

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Health, ingest fixture, smoke chat
        run: |
          pip install httpx
          python scripts/compose_smoke.py --timeout 480

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 CI profile
        env:
          SEARCH_URL: http://localhost:8080/search
          CHAT_URL: http://localhost:8000/v1/chat/completions
        run: k6 run -e K6_PROFILE=ci perf/k6/rag_load.js

      - name: Compose logs on failure
        if: failure()
        continue-on-error: true
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=200

      - name: Tear down
        if: always()
        continue-on-error: true
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff check
        run: |
          pip install ruff mypy
          ruff check document-index document-console query-agent
      - name: Mypy (query-agent usecases)
        run: |
          pip install -e "query-agent/[dev]"
          mypy query-agent/app/usecases --ignore-missing-imports
        continue-on-error: true
