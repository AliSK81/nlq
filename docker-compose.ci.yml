# CI overlay: slim stack for k6 (no WebUI/docling). Use with:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build \
#     postgres qdrant tika mock-llm document-index query-agent
services:
  # Base compose gates Tika behind profile "tika"; CI always needs it.
  tika:
    profiles: !reset

  mock-llm:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./scripts/mock_openai_server.py:/app/mock_openai_server.py:ro
    command: ["python", "/app/mock_openai_server.py", "--port", "8080"]
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  document-index:
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tika:
        condition: service_started
    environment:
      EXTRACTOR: tika
      TIKA_URL: http://tika:9998
      RERANKER: passthrough

  query-agent:
    depends_on:
      document-index:
        condition: service_started
      mock-llm:
        condition: service_healthy
    environment:
      DOCUMENT_INDEX_URL: http://document-index:8080
      LLM_BASE_URL: http://mock-llm:8080/v1
      LLM_API_KEY: mock
      LLM_MODEL: mock
